<!Doctype html>
<html lang="jp" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ERROR</title>
</head>
  <body>
    <h1 th:text="${status} + '' + ${error}"></h1>
    <p th:text="${message}"></p>
    <p>ログイン画面へ戻ってください</p>
    <form method="post" th:action="@{/logout}">
        <button class="btn btn-link" type="submit">ログイン画面に戻る</button>
    </form>
  </body>
</html>
