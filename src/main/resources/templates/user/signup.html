<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/user/signup.css}">
    <script th:src="@{/webjar/bootstrap/5.3.8/js/bootstrap.main.js}"></script>
    <title th:text="#{user.signup.title}"></title>
</head>
<body>
  <form id="signup-form" method="post" action="/user/signup" class="form-signup" th:object="${signupForm}">
      <h1 class="text-center" th:text="#{user.signup.title}"></h1>
      <div class="form-group">
          <label for="userId" th:text="#{userId}"></label>
          <input type="text" class="form-control" id="userId" th:field="*{userId}" th:errorclass="is-invalid"/>
          <div class="invalid-feedback" th:errors="*{userId}"></div>
      </div>
      <div class="form-group">
          <label for="password" th:text="#{password}"></label>
          <input type="password" class="form-control" id="password" th:field="*{password}" th:errorclass="is-invalid"/>
          <div class="invalid-feedback" th:errors="*{password}"></div>
      </div>
      <div class="form-group">
          <label for="userName" th:text="#{userName}"></label>
          <input type="text" class="form-control" id="userName" th:field="*{userName}" th:errorclass="is-invalid"/>
          <div class="invalid-feedback" th:errors="*{userName}"></div>
      </div>
      <div class="form-group">
          <label for="birthday" th:text="#{birthday}"></label>
          <input type="text" class="form-control" id="birthday" placeholder="yyyy/MM/dd" th:field="*{birthday}" th:errorclass="is-invalid"/>
          <div class="invalid-feedback" th:errors="*{birthday}"></div>
      </div>
      <div class="form-group">
          <label for="age" th:text="#{age}"></label>
          <input type="text" class="form-control" id="age" th:field="*{age}" th:errorclass="is-invalid"/>
          <div class="invalid-feedback" th:errors="*{age}"></div>
      </div>
      <div class="form-group">
          <div th:each="item:${genderMap}" class="form-check-inline">
              <input th:id="'gender' + ${item.value}" type="radio" class="form-check-input" th:value="${item.value}" th:field="*{gender}" th:errorclass="is-valid"/>
              <label class="form-check-label" th:text="${item.key}" th:for="'gender' + ${item.value}"></label>
              <div class="text-danger" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
          </div>
      </div>
      <input type="submit" th:value="#{user.signup.btn}" class="btn btn-primary w-100 mt-3"/>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
  </form>
</body>
