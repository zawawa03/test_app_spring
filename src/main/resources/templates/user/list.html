<!Doctype html>
<html lang="jp" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
       layout:decorate="~{layout/layout}">
<head>
    <title>ユーザー一覧</title>
    <link rel="stylesheet" th:href="@{/css/user/list.css}">
</head>
<body>
  <div layout:fragment="content">
      <div class="header border-bottom">
          <h1 class="h2">ユーザー一覧画面</h1>
      </div>
      <!-- 検索 -->
      <div class="mb-4">
          <form id="user-search-form" method="post" th:action="@{/user/list}" class="d-flex" th:object="${userListForm}">
              <div class="form-group">
                  <label for="userId" class="mr-2">ユーザーID</label>
                  <input id="userId" type="text" class="form-control" th:field="*{userId}"/>
              </div>
              <div class="form-group mx-sm-3">
                  <label for="userName" class="mr-2">ユーザー名</label>
                  <input id="username" type="text" class="form-control" th:field="*{userName}"/>
              </div>
              <div class="py-3">
                <button class="btn btn-primary" type="submit">検索</button>
              </div>
          </form>
      </div>
      <div>
          <table class="table table-striped table-bordered table-hover">
              <thead class="thead-light">
                <tr>
                    <th class="th-width">ユーザーID</th>
                    <th class="th-width">ユーザー名</th>
                    <th class="th-width">誕生日</th>
                    <th class="th-width">年齢</th>
                    <th class="th-width">性別</th>
                    <th></th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="item: ${userList}">
                    <td th:text="${item.userId}"></td>
                    <td th:text="${item.userName}"></td>
                    <td th:text="${#dates.format(item.birthday, 'YYYY/MM/dd')}"></td>
                    <td th:text="${item.age}"></td>
                    <td th:text="${item.gender==1? '男性' : '女性'}"></td>
                    <td>
                        <a class="btn btn-primary" th:href="@{/user/detail/{userId}(userId=${item.userId})}">
                            詳細
                        </a>
                    </td>
                </tr>
              </tbody>
          </table>
      </div>
  </div>
</body>
</html>
