<!DOCTYPE html>
  <html lang="ja">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" th:href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
      <link rel="stylesheet" th:href="/css/login/login.css">
      <script th:src="/webjar/bootstrap/5.3.8/js/bootstrap.min.js"></script>
      <title>ログイン</title>
  </head>
  <body class="bg-light">
    <div class="text-center">
        <form method="post" th:action="@{/login}" class="form-login">
            <h2>ログイン</h2>
            <div class="form-group">
                <label for="userId" class="sr-only">userId</label>
                <input type="text" class="form-control" placeholder="ユーザーID" name="userId" id="userId"/>
            </div>

            <div class="form-group">
                <label for="password" class="sr-only form-label">password</label>
                <input type="text" class="form-control" placeholder="パスワード" name="password" id="password"/>
            </div>
            <input type="submit" value="ログイン" class="btn btn-primary" />
        </form>
        <a th:href="@{/user/signup}">新規登録はこちら</a>
    </div>
  </body>
